// ─── Freshness helpers ────────────────────────────────────────────────────────

function daysSince(dateStr) {
  if (!dateStr) return null;
  const diff = (new Date() - new Date(dateStr)) / (1000 * 60 * 60 * 24);
  return Math.floor(diff);
}

function freshnessLabel(roastDate, openedDate) {
  const daysRoasted = daysSince(roastDate);
  const daysOpened = daysSince(openedDate);
  if (daysRoasted === null) return null;
  if (daysRoasted < 4) return { label: "Too fresh — rest 4+ days post-roast", level: "warn" };
  if (daysRoasted <= 21) return { label: "Peak window", level: "good" };
  if (daysRoasted <= 42) return { label: "Acceptable", level: "ok" };
  return { label: "Past prime — consider new bag", level: "old" };
}

function CleaningPanel({ C }) {

    try { localStorage.setItem("bambino_clean_done", JSON.stringify(done)); } catch {}
  }, [done]);
  const schedule = CLEAN_SCHEDULES.find(s => s.id === activeSchedule);
  const completedCount = schedule.steps.filter((_, i) => done[`${activeSchedule}-${i}`]).length;
  const scheduleColor = { daily: C.primary, weekly: C.blue, monthly: C.purple };
  const sc = scheduleColor[activeSchedule];

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 22 }}>
        {CLEAN_SCHEDULES.map(s => {
          const col = scheduleColor[s.id];
          return (
            <button key={s.id} onClick={() => setActiveSchedule(s.id)} style={{
              padding: "8px 18px", borderRadius: 6,
              background: activeSchedule === s.id ? col + "18" : "transparent",
              border: `1px solid ${activeSchedule === s.id ? col : C.border2}`,
              color: activeSchedule === s.id ? col : C.muted,

        <div style={{ flex: 1, height: 4, background: C.border2, borderRadius: 2, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${(completedCount / schedule.steps.length) * 100}%`, background: sc, borderRadius: 2, transition: "width 0.3s" }} />
        </div>
        <div style={{ fontFamily: C.mono, fontSize: 11, color: sc, whiteSpace: "nowrap" }}>{completedCount} / {schedule.steps.length}</div>
        <button onClick={() => setDone(d => { const n = {...d}; schedule.steps.forEach((_, i) => delete n[`${activeSchedule}-${i}`]); return n; })} style={{ background: "none", border: "none", color: C.textDim, fontFamily: C.mono, fontSize: 9, cursor: "pointer", letterSpacing: "0.1em", textTransform: "uppercase" }}>RESET</button>

      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 18 }}>

            }}>
              <div style={{
                width: 26, height: 26, borderRadius: "50%", flexShrink: 0,
                background: isDone ? sc : "transparent",
                border: `2px solid ${isDone ? sc : C.border2}`,
                display: "flex", alignItems: "center", justifyContent: "center",
                color: isDone ? C.bg : C.muted, fontFamily: C.mono, fontSize: isDone ? 13 : 10, fontWeight: 500,
              }}>{isDone ? "✓" : i + 1}</div>
              <div>
                <div style={{ fontFamily: C.mono, fontSize: 12, fontWeight: 500, color: isDone ? C.muted : C.text, marginBottom: 5 }}>{step.title}</div>
                <div style={{ fontFamily: C.mono, fontSize: 11, color: C.textDim, lineHeight: 1.8 }}>{step.detail}</div>
              </div>
            </div>
          );
        })}
      </div>

      {activeSchedule === "weekly" && (
        <div style={{ background: C.blueGlow, border: `1px solid ${C.blueBright}`, borderRadius: 10, padding: 17, marginBottom: 14 }}>
          <div style={{ fontFamily: C.mono, fontSize: 9, color: C.blueBright, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 12 }}>Puly Caff Backflush — Step by Step</div>
          {[
            "Insert solid blind basket (no hole) into portafilter",
            "Add ½ tsp Puly Caff powder to basket",
            "Lock portafilter into group head",
            "Press 1-shot: 5s on, release — repeat 5–6 times",
            "Remove portafilter, discard residue",
            "Re-lock with clean blind basket, no powder",
            "Repeat 4–5 flush cycles with plain water only",
            "Water should run clear, no chemical smell",
          ].map((t, i) => (
            <div key={i} style={{ display: "flex", gap: 10, marginBottom: 5, alignItems: "flex-start" }}>
              <div style={{ fontFamily: C.mono, fontSize: 9, color: C.blueBright, width: 16, flexShrink: 0 }}>{i+1}.</div>
              <div style={{ fontFamily: C.mono, fontSize: 11, color: C.textMid, lineHeight: 1.6 }}>{t}</div>
            </div>
          ))}
        </div>
      )}

      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: 17 }}>
        <div style={{ fontFamily: C.mono, fontSize: 9, color: C.muted, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 11 }}>Watch Out For</div>
        {CLEAN_TIPS.map((tip, i) => (
          <div key={i} style={{ display: "flex", gap: 9, marginBottom: 7, alignItems: "flex-start" }}>
            <div style={{ color: C.primary, fontSize: 10, flexShrink: 0, marginTop: 1 }}>→</div>
            <div style={{ fontFamily: C.mono, fontSize: 11, color: C.textDim, lineHeight: 1.7 }}>{tip}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

                    <div style={{ display: "flex", gap: 10, alignItems: "baseline", flexWrap: "wrap", marginBottom: 6 }}>
                      <div style={{ fontFamily: C.mono, fontSize: 14, fontWeight: 500, color: C.text }}>{bag.name}</div>
                      {bag.roaster && <div style={{ fontFamily: C.mono, fontSize: 10, color: C.textDim }}>{bag.roaster}</div>}
                      {bag.grindSetting && (
                        <div style={{ fontFamily: C.mono, fontSize: 10, background: C.primaryGlow, border: `1px solid ${C.primary}`, borderRadius: 4, padding: "2px 8px", color: C.primary }}>
                          Setting #{bag.grindSetting}
                        </div>
                      )}
                    </div>

                    <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: bag.notes ? 8 : 0 }}>

                        <div>
                          <div style={{ fontFamily: C.mono, fontSize: 9, color: C.textDim, textTransform: "uppercase", letterSpacing: "0.1em" }}>Roasted</div>
                          <div style={{ fontFamily: C.mono, fontSize: 11, color: C.text }}>{bag.roastDate} <span style={{ color: C.textDim }}>({daysRoasted}d ago)</span></div>
                        </div>
                      )}
                      {bag.openedDate && (
                        <div>
                          <div style={{ fontFamily: C.mono, fontSize: 9, color: C.textDim, textTransform: "uppercase", letterSpacing: "0.1em" }}>Opened</div>
                          <div style={{ fontFamily: C.mono, fontSize: 11, color: C.text }}>{bag.openedDate} <span style={{ color: C.textDim }}>({daysOpened}d ago)</span></div>
                        </div>
                      )}
                    </div>

                    {bag.notes && <div style={{ fontFamily: C.mono, fontSize: 11, color: C.textDim, fontStyle: "italic", marginTop: 4 }}>{bag.notes}</div>}
                  </div>

                  <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 8 }}>
                    {freshness && (
                      <div style={{ fontFamily: C.mono, fontSize: 10, color: fCol, background: fCol + "18", border: `1px solid ${fCol}44`, borderRadius: 5, padding: "4px 10px", whiteSpace: "nowrap" }}>
                        {freshness.label}
                      </div>
                    )}
                    <button onClick={() => setBags(p => p.filter(b => b.id !== bag.id))} style={{ background: "none", border: "none", color: C.muted, fontSize: 13, opacity: 0.4, cursor: "pointer" }}>✕</button>
                  </div>
                </div>

                {/* Freshness bar */}
                {bag.roastDate && daysRoasted !== null && (
                  <div style={{ height: 3, background: C.border }}>
                    <div style={{
                      height: "100%",
                      width: `${Math.min(100, (daysRoasted / 60) * 100)}%`,
                      background: fCol,
                      transition: "width 0.4s",
                    }} />
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

                      flex: 1, padding: "9px 5px", borderRadius: 8,
                      background: form.taste === t.value ? col + "18" : C.bg,
                      border: `1px solid ${form.taste === t.value ? col : C.border}`,
                      color: form.taste === t.value ? col : C.muted, fontSize: 11, textAlign: "center",
                    }}>
                      <div style={{ fontSize: 17, marginBottom: 3 }}>{t.emoji}</div>
                      {t.label}
                    </button>
                  );
                })}
              </div>
              {form.taste !== undefined && (
                <div style={{ background: C.bg, borderRadius: 8, padding: 13, borderLeft: `3px solid ${tasteColor(form.taste)}` }}>
                  <div style={{ fontSize: 11, color: C.textMid, lineHeight: 1.7 }}>{ADJUSTMENT_TIPS[String(form.taste)]}</div>
                </div>
              )}
            </div>

            <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 9, padding: "13px 16px", marginBottom: 18 }}>
              <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 5 }}>Notes</div>
              <input value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))}
                placeholder="Flow, crema, basket, anything worth logging…"
                style={{ background: "transparent", border: "none", outline: "none", fontSize: 13, color: C.text, width: "100%" }}
              />
            </div>

            <button onClick={handleSave} style={{
              width: "100%", padding: 14, borderRadius: 9,
              background: saved ? C.primary + "22" : C.primaryGlow,
              border: `1px solid ${saved ? C.primary : C.primary + "55"}`,
              color: C.primary, fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", transition: "all 0.3s",
            }}>{saved ? "✓ Shot Logged" : "Log Shot"}</button>
          </div>
        )}

        {/* ── DIAGNOSE ──────────────────────────────────────────────────────── */}
        {tab === "diagnose" && (
          <div className="fade">
            <div style={{ fontSize: 19, fontWeight: 500, marginBottom: 5, color: C.blueBright }}>Shot Diagnostics</div>
            <div style={{ fontSize: 11, color: C.textDim, marginBottom: 26 }}>Read your puck and your stock portafilter — then fix the root cause</div>
            <DiagnosePanel C={C} />
          </div>
        )}

        {/* ── WORKFLOW ──────────────────────────────────────────────────────── */}
        {tab === "workflow" && (
          <div className="fade">
            <div style={{ fontSize: 19, fontWeight: 500, marginBottom: 5, color: C.primary }}>Shot Workflow</div>
            <div style={{ fontSize: 11, color: C.textDim, marginBottom: 26 }}>Bambino + Virtuoso+ + Normcore spring tamper + Subminimal Flick</div>

            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 22 }}>
              {WORKFLOW.map((step, i) => {
                const done = checklist[step.id];
                return (
                  <div key={step.id} onClick={() => setChecklist(c => ({ ...c, [step.id]: !c[step.id] }))} style={{
                    background: done ? C.primary + "0c" : C.surface,
                    border: `1px solid ${done ? C.primary + "44" : C.border}`,
                    borderRadius: 10, padding: "14px 17px",
                    display: "flex", gap: 13, alignItems: "flex-start", cursor: "pointer", transition: "border-color 0.15s",
                  }}>
                    <div style={{
                      width: 26, height: 26, borderRadius: "50%", flexShrink: 0,
                      background: done ? C.primary : "transparent",
                      border: `2px solid ${done ? C.primary : C.border2}`,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      color: done ? C.bg : C.muted, fontSize: done ? 12 : 10, fontWeight: 500,
                    }}>{done ? "✓" : i + 1}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", gap: 7, alignItems: "center", marginBottom: 4 }}>
                        <span style={{ fontSize: 13 }}>{step.icon}</span>
                        <div style={{ fontSize: 13, fontWeight: 500, color: done ? C.primary : C.text }}>{step.title}</div>
                      </div>
                      <div style={{ fontSize: 11, color: C.textDim, lineHeight: 1.7, marginBottom: 4 }}>{step.detail}</div>
                      <div style={{ fontSize: 10, color: C.blueBright }}>↳ {step.tip}</div>
                    </div>
                  </div>
                );
              })}
            </div>

            <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: 18 }}>
              <div style={{ fontSize: 11, fontWeight: 500, color: C.primary, marginBottom: 14 }}>Starting Parameters</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {[
                  ["Single wall","Setting 8 · 18g → 36g · 30s"],
                  ["Dual wall","Setting 12 · 18g → 36g · 25s"],
                  ["First drip","7–9s from pump start"],
                  ["Flick WDT","15–20s · circles + radial"],
                  ["Tamp","Spring click = done"],
                  ["Group flush","2–3s blank before every shot"],
                ].map(([k, v]) => (
                  <div key={k} style={{ borderBottom: `1px solid ${C.border}`, paddingBottom: 8 }}>
                    <div style={{ fontSize: 9, color: C.textDim, textTransform: "uppercase", letterSpacing: "0.1em" }}>{k}</div>
                    <div style={{ fontSize: 12, color: C.text, marginTop: 2 }}>{v}</div>
                  </div>
                ))}
              </div>
              <button onClick={() => setChecklist({})} style={{ marginTop: 14, padding: "7px 14px", background: "transparent", border: `1px solid ${C.border2}`, borderRadius: 5, color: C.muted, fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase" }}>
                Reset Checklist
              </button>
            </div>
          </div>
        )}

        {/* ── BEANS ────────────────────────────────────────────────────────── */}
        {tab === "beans" && (
          <div className="fade">
            <div style={{ fontSize: 19, fontWeight: 500, marginBottom: 5, color: C.primary }}>Beans</div>
            <div style={{ fontSize: 11, color: C.textDim, marginBottom: 26 }}>Track what's open, when it was roasted, and how fresh it is</div>
            <BeansPanel C={C} />
          </div>
        )}

        {/* ── CLEAN ────────────────────────────────────────────────────────── */}
        {tab === "clean" && (
          <div className="fade">
            <div style={{ fontSize: 19, fontWeight: 500, marginBottom: 5, color: C.purple }}>Cleaning Guide</div>
            <div style={{ fontSize: 11, color: C.textDim, marginBottom: 26 }}>Bambino · Blind basket · Puly Caff · Grinder brushing</div>
            <CleaningPanel C={C} />
          </div>
        )}

        {/* ── HISTORY ──────────────────────────────────────────────────────── */}
        {tab === "history" && (
          <div className="fade">
            <div style={{ fontSize: 19, fontWeight: 500, marginBottom: 5, color: C.primary }}>Shot History</div>
            <div style={{ fontSize: 11, color: C.textDim, marginBottom: 26 }}>{shots.length} shot{shots.length !== 1 ? "s" : ""} logged</div>

            {shots.length === 0 ? (
              <div style={{ textAlign: "center", padding: "60px 0", color: C.border2, fontFamily: C.mono, fontSize: 13 }}>
                No shots yet.
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {shots.map(shot => {
                  const taste = tasteFor(shot.taste);
                  const tCol = taste.color || C.primary;
                  const r = (shot.yield / shot.dose).toFixed(1);
                  const b = BASKET_TYPES[shot.basket];
                  const bCol = shot.basket === "single" ? C.primary : C.blueBright;
                  return (
                    <div key={shot.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: "13px 17px", display: "flex", gap: 13, alignItems: "center" }}>
                      <div style={{ width: 34, height: 34, borderRadius: "50%", background: bCol + "18", border: `2px solid ${bCol}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                        <div style={{ fontSize: 10, color: bCol, fontWeight: 500 }}>#{shot.setting}</div>
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: "flex", gap: 9, alignItems: "center", marginBottom: 5, flexWrap: "wrap" }}>
                          <span style={{ fontSize: 9, color: C.textDim }}>{shot.date}</span>
                          <span style={{ fontSize: 10, color: tCol }}>{taste.emoji} {taste.label}</span>
                          <span style={{ fontSize: 9, color: C.muted }}>{b.name}</span>
                        </div>
                        <div style={{ display: "flex", gap: 18 }}>
                          {[[`${shot.dose}g→${shot.yield}g`,"dose/yield"],[`1:${r}`,"ratio"],[`${shot.time}s`,"time"]].map(([val, lbl]) => (
                            <div key={lbl}>
                              <div style={{ fontSize: 14, color: C.text, fontWeight: 500 }}>{val}</div>
                              <div style={{ fontSize: 9, color: C.textDim, textTransform: "uppercase", letterSpacing: "0.1em" }}>{lbl}</div>
                            </div>
                          ))}
                        </div>
                        {shot.notes && <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>{shot.notes}</div>}
                      </div>
                      <button onClick={() => setShots(p => p.filter(s => s.id !== shot.id))} style={{ background: "none", border: "none", color: C.muted, fontSize: 13, opacity: 0.35, cursor: "pointer" }}>✕</button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<BambinoCompanion />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
